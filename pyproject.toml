[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "podcast-playground"
version = "0.1.0"
description = "Generate podcast-style audio locally with multiple free TTS engines"
readme = "README.md"
requires-python = ">=3.10,<4"
license = {text = "MIT"}
keywords = [
    "podcast",
    "tts",
    "text-to-speech",
    "audio",
    "edge-tts",
    "bark",
    "parler-tts",
    "ai",
    "speech-synthesis",
    "podcast-generator",
    "notebooklm",
    "ollama",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
]
dependencies = [
    "soundfile>=0.12.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
edge = ["edge-tts", "pydub"]
bark = ["bark-ml", "torch>=2.1.0"]
parler = [
    "parler-tts>=0.2.0",
    "transformers>=4.43.0",
    "torch>=2.1.0",
]
all = [
    "podcast-playground[edge,bark,parler]",
]

[project.scripts]
podcast-playground = "podcast_playground.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
