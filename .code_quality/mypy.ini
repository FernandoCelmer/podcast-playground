[mypy]
python_version = 3.12

warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
show_error_codes = True

exclude = build/,dist/,venv/,.venv/,migrations/,alembic/

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-mangum.*]
ignore_missing_imports = True

[mypy-jwt.*]
ignore_missing_imports = True

[mypy-pymysql.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-dotflow.*]
ignore_missing_imports = True

[mypy-app.*]
disallow_untyped_defs = False

[mypy-app.serializers.*]
disable_error_code = prop-decorator

[mypy-app.schemas.task]
disable_error_code = prop-decorator

[mypy-app.schemas.workflow]
disable_error_code = prop-decorator

[mypy-app.core.listing.filter]
disable_error_code = no-any-return

[mypy-app.repositories.workflow_repository]
disable_error_code = no-any-return

[mypy-app.services.template_service]
disable_error_code = no-any-return

[mypy-app.services.refresh_token_service]
disable_error_code = unreachable

[mypy-app.services.device_authorization_service]
disable_error_code = unreachable

[mypy-app.services.workflow_service]
disable_error_code = unreachable, unused-ignore

[mypy-app.services.workflow_build_service]
disable_error_code = unused-ignore

[mypy-tests.*]
disallow_untyped_defs = False

[mypy-tests.repository.*]
disable_error_code = method-assign

[mypy-tests.services.*]
disable_error_code = method-assign
